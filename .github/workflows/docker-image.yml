name: Build & Push Userbot Image

on:
  push:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Userbot Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/userbot:latest ./userbot

      - name: Push Userbot Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/userbot:latest
